<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#e2e8f0"/>

  <!-- Simple person silhouette -->
  <g fill="#94a3b8">
    <!-- Head -->
    <circle cx="100" cy="75" r="35"/>
    <!-- Body -->
    <ellipse cx="100" cy="175" rx="55" ry="45"/>
  </g>

  <!-- Plus icon to indicate "add photo" -->
  <g transform="translate(140, 140)" fill="#ffffff" stroke="#2563eb" stroke-width="2">
    <circle cx="20" cy="20" r="20" fill="#2563eb"/>
    <line x1="12" y1="20" x2="28" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="12" x2="20" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
