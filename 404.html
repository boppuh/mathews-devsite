<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Page Not Found — Ryan Mathews</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./styles.css">

  <!-- Additional styles for 404 page -->
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .error-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
    }

    .error-inner {
      max-width: 28rem;
    }

    .error-code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: var(--font-bold);
      color: var(--color-primary);
      line-height: var(--leading-none);
      margin-bottom: var(--space-4);
      letter-spacing: -0.03em;
    }

    .error-title {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-4);
    }

    .error-message {
      color: var(--color-text-muted);
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
      margin-bottom: var(--space-8);
    }

    .error-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-3);
    }
  </style>
</head>
<body class="error-page">
  <!-- Skip link -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Simple header -->
  <header class="site-header">
    <nav class="nav-container" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./index.html#projects">Projects</a></li>
        <li><a href="./index.html#contact">Contact</a></li>
      </ul>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <svg class="theme-icon-light" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-dark" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </nav>
  </header>

  <main id="main" class="error-content">
    <div class="error-inner">
      <p class="error-code">404</p>
      <h1 class="error-title">Page not found</h1>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>
      <div class="error-links">
        <a href="./index.html" class="btn btn-primary">
          Go to Homepage
        </a>
        <a href="./index.html#projects" class="btn btn-secondary">
          View Projects
        </a>
        <a href="./index.html#contact" class="btn btn-secondary">
          Contact Me
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="current-year">2024</span> Ryan Mathews</p>
    </div>
  </footer>

  <!-- Script -->
  <script src="./script.js"></script>
</body>
</html>
